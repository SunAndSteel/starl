<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moniteur Starlink</title>
    <script type="module" crossorigin src="/assets/index-DSDW--QQ.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-cVVmbSZf.css">
  </head>
  <body>
    <div id="app">
      <header class="masthead">
        <div>
          <p class="eyebrow">Starlink</p>
        </div>
      </header>

      <section class="sky-card">
        <div class="sky-layout">
          <aside class="sky-sidebar sky-sidebar-left">
            <section class="sidebar-card control-card">
              <p class="control-heading">Observateur</p>
              <div class="observer-fields">
                <input id="observer-latitude" class="observer-input" type="text" inputmode="decimal" spellcheck="false" placeholder="Latitude" />
                <input id="observer-longitude" class="observer-input" type="text" inputmode="decimal" spellcheck="false" placeholder="Longitude" />
                <input id="observer-altitude" class="observer-input observer-input-altitude" type="text" inputmode="decimal" spellcheck="false" placeholder="Altitude m" />
              </div>
              <div class="action-stack">
                <button id="observer-save-button" class="ghost-button ghost-button-compact" type="button">Définir position</button>
                <button id="export-button" class="ghost-button ghost-button-compact" type="button">Exporter PNG</button>
                <button id="tle-refresh-button" class="ghost-button ghost-button-compact" type="button">Rafraîchir TLE</button>
                <button id="sky-camera-reset" class="ghost-button ghost-button-compact" type="button">Réinitialiser vue</button>
              </div>
            </section>

            <section class="sidebar-card control-card">
              <p class="control-heading">Couches</p>
              <div class="layer-stack">
                <label class="layer-pill"><input id="layer-mask" type="checkbox" checked /> Carte d'obstruction</label>
                <label class="layer-pill"><input id="layer-live" type="checkbox" checked /> Satellites en direct</label>
                <label class="layer-pill"><input id="layer-dish" type="checkbox" checked /> Vecteur de l'antenne</label>
              </div>
            </section>
          </aside>

          <div class="sky-main">
            <div class="sky-stage">
              <canvas id="sky-scene"></canvas>
              <div class="sky-cardinals" aria-hidden="true">
                <span id="sky-cardinal-n" class="sky-cardinal">N</span>
                <span id="sky-cardinal-s" class="sky-cardinal">S</span>
                <span id="sky-cardinal-e" class="sky-cardinal">E</span>
                <span id="sky-cardinal-o" class="sky-cardinal">O</span>
              </div>
            </div>
          </div>

          <aside class="sky-sidebar sky-sidebar-right">
            <section class="sidebar-card status-card">
              <h2>Statut en direct</h2>
              <div id="status-grid" class="metric-grid"></div>
              <div class="sky-footer">
                <div id="sky-status" class="sky-meta"></div>
                <div id="sky-clusters" class="sky-meta sky-meta-right"></div>
              </div>
            </section>
          </aside>
        </div>
      </section>
    </div>
  </body>
</html>
